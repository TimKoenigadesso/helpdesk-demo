stages:
  - build
  - implement
  - test
  - fix
  - finalize
  - deploy
  - reset

variables:
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  # Vertex AI — Anthropic Modelle ueber Google Cloud
  ANTHROPIC_VERTEX_PROJECT_ID: $GCP_PROJECT_ID
  CLOUD_ML_REGION: europe-west1

# ── BUILD ──────────────────────────────────────────────────────────────────

build:
  stage: build
  image: docker:24
  services: [docker:24-dind]
  rules:
    - if: '$PIPELINE_TYPE == "agentic-feature" && $JIRA_TICKET_ID'
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA ./backend
    - docker build -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA ./frontend
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA

# ── IMPLEMENT ─────────────────────────────────────────────────────────────
# FIX: Confluence-Kontext wird vor dem Claude-Aufruf geladen und in den Prompt injiziert

claude-implement:
  stage: implement
  image: node:20-slim
  rules:
    - if: '$PIPELINE_TYPE == "agentic-feature" && $JIRA_TICKET_ID'
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl python3 python3-pip
    - pip install -q --break-system-packages "anthropic[vertex]>=0.40.0"
    - echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > /tmp/gcp-key.json
    - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
    - git config user.email "claude-code@adesso.de"
    - git config user.name "Claude Code Agent"
    - git checkout -b "feature/$JIRA_TICKET_ID" 2>/dev/null || git checkout "feature/$JIRA_TICKET_ID"
  script:
    # Jira Ticket laden
    - |
      TICKET_CONTENT=$(curl -sf \
        -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
        -H "Accept: application/json" \
        "$JIRA_BASE_URL/rest/api/3/issue/$JIRA_TICKET_ID?fields=summary,description" \
        || echo '{"error":"Jira nicht erreichbar"}')
    # FIX 2: Confluence-Kontext laden (tolerant gegen Fehler)
    - |
      CONF_CONTEXT="Nicht verfuegbar"
      if [ -n "$CONFLUENCE_BASE_URL" ] && [ -n "$CONFLUENCE_SPACE_KEY" ]; then
        CONF_RAW=$(curl -sf \
          -H "Authorization: Basic $(printf '%s:%s' "$JIRA_USER_EMAIL" "${CONFLUENCE_API_TOKEN:-$JIRA_API_TOKEN}" | base64 -w0)" \
          -H "Accept: application/json" \
          "$CONFLUENCE_BASE_URL/wiki/rest/api/content/search?cql=type=page+AND+space=\"$CONFLUENCE_SPACE_KEY\"&limit=5&expand=body.view" \
          2>/dev/null || echo '{"results":[]}')
        CONF_CONTEXT=$(echo "$CONF_RAW" | python3 -c "
      import sys, json, re
      pages = json.load(sys.stdin).get('results', [])
      out = []
      for p in pages:
          title = p.get('title', '')
          html = p.get('body', {}).get('view', {}).get('value', '')
          text = re.sub('<[^>]+>', ' ', html)
          text = re.sub(r'\s+', ' ', text).strip()[:600]
          out.append(f'### {title}\n{text}')
      print('\n\n'.join(out)[:4000])
      " 2>/dev/null || echo "Parse-Fehler")
      fi
    # Python-Agent via Vertex AI (Template aus Repo, kein Heredoc/YAML-Problem)
    - export TICKET_CONTENT="$TICKET_CONTENT" CONF_CONTEXT="$CONF_CONTEXT"
    - python3 scripts/claude-agent.py scripts/prompts/implement.txt 80
    - git push origin "feature/$JIRA_TICKET_ID" --set-upstream --force-with-lease

# ── TEST ──────────────────────────────────────────────────────────────────

test-unit:
  stage: test
  image: python:3.12-slim
  rules:
    - if: '$PIPELINE_TYPE == "agentic-feature" && $JIRA_TICKET_ID'
  needs: [claude-implement]
  before_script:
    - git fetch origin
    - git checkout "feature/$JIRA_TICKET_ID"
    - pip install -q --break-system-packages fastapi uvicorn pydantic pytest httpx "anthropic[vertex]>=0.40.0"
  script:
    - cd backend && python -m pytest tests/ -v --tb=short
  artifacts:
    when: always
    paths: [backend/]
    expire_in: 1 hour

# FIX 1: Backend + Frontend werden vor den Playwright-Tests gestartet
test-e2e:
  stage: test
  image: mcr.microsoft.com/playwright:v1.44.0-jammy
  rules:
    - if: '$PIPELINE_TYPE == "agentic-feature" && $JIRA_TICKET_ID'
  needs: [claude-implement]
  variables:
    FRONTEND_URL: http://localhost:5173
  before_script:
    - git fetch origin
    - git checkout "feature/$JIRA_TICKET_ID"
    # Python + Backend-Abhaengigkeiten
    - pip install -q --break-system-packages fastapi uvicorn pydantic "anthropic[vertex]>=0.40.0"
    # Backend im Hintergrund starten (Fallback-Modus ohne echte Vertex-Credentials)
    - cd backend
    - DB_PATH=/tmp/e2e.db ANTHROPIC_VERTEX_PROJECT_ID=mock uvicorn main:app --host 0.0.0.0 --port 8000 &
    - cd ..
    # Frontend bauen und statisch servieren
    - cd frontend && npm ci
    - VITE_API_URL=http://localhost:8000 npm run build
    - npx serve dist --listen 5173 &
    - cd ..
    # Auf Backend warten (max 30 Sekunden)
    - |
      for i in $(seq 1 15); do
        curl -sf http://localhost:8000/health && echo "Backend bereit" && break || sleep 2
      done
    - npx playwright install --with-deps chromium
  script:
    - FRONTEND_URL=http://localhost:5173 npx playwright test --reporter=list
  artifacts:
    when: always
    paths: [playwright-report/, test-results/]
    expire_in: 1 hour

# ── FIX LOOP ──────────────────────────────────────────────────────────────

fix-iteration:
  stage: fix
  image: node:20-slim
  rules:
    - if: '$PIPELINE_TYPE == "agentic-feature" && $JIRA_TICKET_ID'
      when: on_failure
  variables:
    FIX_ITERATION: "1"
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl python3 python3-pip
    - pip install -q --break-system-packages fastapi uvicorn pydantic pytest httpx "anthropic[vertex]>=0.40.0"
    - echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > /tmp/gcp-key.json
    - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
    - git config user.email "claude-code@adesso.de"
    - git config user.name "Claude Code Bug Fixer"
    - git fetch origin
    - git checkout "feature/$JIRA_TICKET_ID"
  script:
    - |
      if [ "$FIX_ITERATION" -gt "3" ]; then
        echo "Maximale Iterationen erreicht - eskaliere an Jira"
        curl -sf -X POST \
          -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
          -H "Content-Type: application/json" \
          "$JIRA_BASE_URL/rest/api/3/issue/$JIRA_TICKET_ID/comment" \
          -d "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"Pipeline nach 3 Fix-Iterationen fehlgeschlagen. Manuelle Pruefung erforderlich. Pipeline: $CI_PIPELINE_URL\"}]}]}}" || true
        exit 1
      fi
    # Testausgabe fuer beide Test-Typen sammeln
    - cd backend && python -m pytest tests/ -v --tb=long 2>&1 | tee /tmp/test-output.txt; cd ..
    # Bug fixer via Python-Agent
    - export TEST_OUTPUT="$(cat /tmp/test-output.txt | tail -80)"
    - python3 scripts/claude-agent.py scripts/prompts/fix.txt 30
    - git push origin "feature/$JIRA_TICKET_ID" --force-with-lease
    # Verifizierung nach dem Fix
    - cd backend && python -m pytest tests/ -v --tb=short

# ── FINALIZE ──────────────────────────────────────────────────────────────
# FIX 3: Dokumentation generieren + Jira-Status auf "Ready for Review" setzen

create-merge-request:
  stage: finalize
  image: node:20-slim
  rules:
    - if: '$PIPELINE_TYPE == "agentic-feature" && $JIRA_TICKET_ID'
  needs:
    - job: test-unit
    - job: test-e2e
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl python3 python3-pip
    - pip install -q --break-system-packages "anthropic[vertex]>=0.40.0"
    - echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > /tmp/gcp-key.json
    - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
    - git config user.email "claude-code@adesso.de"
    - git config user.name "Claude Code Agent"
    - git fetch origin
    - git checkout "feature/$JIRA_TICKET_ID"
  script:
    # Schritt 1: Feature-Dokumentation via Python-Agent generieren und committen
    - python3 scripts/claude-agent.py scripts/prompts/document.txt 15
    # Schritt 2: Merge Request in GitLab erstellen
    - |
      MR_RESPONSE=$(curl -sf -X POST \
        -H "PRIVATE-TOKEN: $GITLAB_ACCESS_TOKEN" \
        -H "Content-Type: application/json" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests" \
        -d "{
          \"source_branch\": \"feature/$JIRA_TICKET_ID\",
          \"target_branch\": \"main\",
          \"title\": \"[$JIRA_TICKET_ID] Automatisch implementiert durch Claude Code\",
          \"description\": \"## Automatisch generiert durch Claude Code\n\n**Jira Ticket:** $JIRA_BASE_URL/browse/$JIRA_TICKET_ID\n**Pipeline:** $CI_PIPELINE_URL\n\nAlle Unit Tests und Playwright E2E Tests erfolgreich.\n\nFeature-Dokumentation: siehe \`docs/FEATURE_DOCS.md\` in diesem Branch.\",
          \"labels\": \"agentic-delivery\"
        }")
      MR_URL=$(echo "$MR_RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('web_url',''))" 2>/dev/null || echo "")
      echo "MR_URL=$MR_URL" > mr-url.env
      echo "Merge Request erstellt: $MR_URL"
    # Schritt 3: MR-URL als Kommentar in Jira hinzufuegen
    - |
      MR_URL=$(cat mr-url.env | grep MR_URL | cut -d= -f2)
      curl -sf -X POST \
        -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
        -H "Content-Type: application/json" \
        "$JIRA_BASE_URL/rest/api/3/issue/$JIRA_TICKET_ID/comment" \
        -d "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"Merge Request automatisch erstellt: $MR_URL. Alle Tests erfolgreich.\"}]}]}}" || true
    # FIX 3: Jira-Status auf "Ready for Review" setzen
    - |
      TRANSITIONS=$(curl -sf \
        -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
        -H "Accept: application/json" \
        "$JIRA_BASE_URL/rest/api/3/issue/$JIRA_TICKET_ID/transitions" \
        || echo '{"transitions":[]}')
      TRANSITION_ID=$(echo "$TRANSITIONS" | python3 -c "
      import sys, json
      for t in json.load(sys.stdin).get('transitions', []):
          name = t['name'].lower()
          if any(k in name for k in ['review', 'ready', 'bereit', 'done']):
              print(t['id'])
              break
      " 2>/dev/null || echo "")
      if [ -n "$TRANSITION_ID" ]; then
        curl -sf -X POST \
          -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
          -H "Content-Type: application/json" \
          "$JIRA_BASE_URL/rest/api/3/issue/$JIRA_TICKET_ID/transitions" \
          -d "{\"transition\":{\"id\":\"$TRANSITION_ID\"}}" \
          && echo "Jira-Status auf Ready for Review gesetzt" \
          || echo "Status-Transition fehlgeschlagen (nicht kritisch)"
      else
        echo "Keine passende Transition gefunden (Ready for Review / In Review)"
      fi
  artifacts:
    reports:
      dotenv: mr-url.env

# ── DEPLOY ────────────────────────────────────────────────────────────────
# Laeuft automatisch bei jedem Push auf main
# Benoetigt CI/CD-Variablen: GCP_PROJECT_ID, GCP_SERVICE_ACCOUNT_KEY,
#   GCP_SA_EMAIL, VITE_JIRA_URL, VITE_CONFLUENCE_URL

deploy:
  stage: deploy
  image: docker:24
  services: [docker:24-dind]
  rules:
    # Nur bei explizitem PIPELINE_TYPE=deploy UND wenn GCP-Variablen gesetzt sind
    - if: '$PIPELINE_TYPE == "deploy" && $GCP_SERVICE_ACCOUNT_KEY && $GCP_PROJECT_ID'
  variables:
    GAR_REGION: europe-west1
    GAR_REPO: helpdesk-demo
    SERVICE_REGION: europe-west1
  before_script:
    - apk add --no-cache curl python3 bash
    # Google Cloud SDK installieren
    - curl -sSL https://sdk.cloud.google.com | bash -s -- --disable-prompts --install-dir=/usr/local
    - export PATH="/usr/local/google-cloud-sdk/bin:$PATH"
    # Authentifizieren
    - echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > /tmp/gcp-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
    - gcloud config set project "$GCP_PROJECT_ID"
    # Docker fuer Artifact Registry konfigurieren
    - gcloud auth configure-docker "${GAR_REGION}-docker.pkg.dev" --quiet
    # Artifact Registry Repository anlegen (idempotent)
    - |
      gcloud artifacts repositories describe "$GAR_REPO" \
        --location="$GAR_REGION" --quiet 2>/dev/null \
      || gcloud artifacts repositories create "$GAR_REPO" \
          --repository-format=docker \
          --location="$GAR_REGION" \
          --quiet
  script:
    - export IMAGE_BASE="${GAR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPO}"

    # ── Backend bauen & pushen ─────────────────────────────────────────────
    - docker build -t "${IMAGE_BASE}/backend:${CI_COMMIT_SHA}" ./backend
    - docker push "${IMAGE_BASE}/backend:${CI_COMMIT_SHA}"

    # ── Backend auf Cloud Run deployen ────────────────────────────────────
    - |
      gcloud run deploy helpdesk-demo-backend \
        --image "${IMAGE_BASE}/backend:${CI_COMMIT_SHA}" \
        --region "$SERVICE_REGION" \
        --platform managed \
        --allow-unauthenticated \
        --service-account "${GCP_SA_EMAIL}" \
        --set-env-vars "DB_PATH=/tmp/helpdesk.db,ANTHROPIC_VERTEX_PROJECT_ID=${GCP_PROJECT_ID},CLOUD_ML_REGION=${SERVICE_REGION}" \
        --quiet

    # ── Backend-URL ermitteln ──────────────────────────────────────────────
    - |
      BACKEND_URL=$(gcloud run services describe helpdesk-demo-backend \
        --region "$SERVICE_REGION" \
        --format "value(status.url)")
      echo "Backend URL: $BACKEND_URL"

    # ── Frontend bauen (mit allen Konfig-URLs) & pushen ───────────────────
    - |
      docker build \
        --build-arg VITE_API_URL="${BACKEND_URL}" \
        --build-arg VITE_JIRA_URL="${VITE_JIRA_URL:-}" \
        --build-arg VITE_GITLAB_URL="https://gitlab.adesso-group.com" \
        --build-arg VITE_GITLAB_PROJECT_PATH="tim.koenig/helpdesk-demo" \
        --build-arg VITE_CONFLUENCE_URL="${VITE_CONFLUENCE_URL:-}" \
        -t "${IMAGE_BASE}/frontend:${CI_COMMIT_SHA}" \
        ./frontend
    - docker push "${IMAGE_BASE}/frontend:${CI_COMMIT_SHA}"

    # ── Frontend auf Cloud Run deployen ───────────────────────────────────
    - |
      gcloud run deploy helpdesk-demo-frontend \
        --image "${IMAGE_BASE}/frontend:${CI_COMMIT_SHA}" \
        --region "$SERVICE_REGION" \
        --platform managed \
        --allow-unauthenticated \
        --quiet

    # ── Finale URL ausgeben ────────────────────────────────────────────────
    - |
      FRONTEND_URL=$(gcloud run services describe helpdesk-demo-frontend \
        --region "$SERVICE_REGION" \
        --format "value(status.url)")
      echo "================================================================"
      echo "App live: $FRONTEND_URL"
      echo "================================================================"
      echo "FRONTEND_URL=${FRONTEND_URL}" > deploy.env
  artifacts:
    reports:
      dotenv: deploy.env
    expire_in: 7 days

# ── RESET ─────────────────────────────────────────────────────────────────

reset-demo:
  stage: reset
  image: alpine/git
  rules:
    - if: '$PIPELINE_TYPE == "reset-demo"'
  before_script:
    - apk add --no-cache curl python3
    - git config user.email "claude-code@adesso.de"
    - git config user.name "Demo Reset Bot"
  script:
    - bash scripts/reset-demo.sh
