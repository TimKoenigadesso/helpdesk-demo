name: Agentic SDLC

on:
  workflow_dispatch:
    inputs:
      pipeline_type:
        description: 'agentic-feature | reset-demo'
        required: true
        type: string
      jira_ticket_id:
        description: 'Jira Ticket ID z.B. DMBRD-14'
        required: false
        type: string

# Inputs als Env-Vars fuer alle Jobs (sicher - keine direkte Shell-Interpolation)
env:
  PIPELINE_TYPE: ${{ github.event.inputs.pipeline_type }}
  JIRA_TICKET_ID: ${{ github.event.inputs.jira_ticket_id }}
  ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  CLOUD_ML_REGION: europe-west1

# ── IMPLEMENT ─────────────────────────────────────────────────────────────────

jobs:
  implement:
    if: ${{ github.event.inputs.pipeline_type == 'agentic-feature' && github.event.inputs.jira_ticket_id != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhaengigkeiten installieren
        run: pip install -q "anthropic[vertex]>=0.40.0"

      - name: GCP Credentials einrichten
        env:
          GCP_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: echo "$GCP_KEY" | base64 -d > /tmp/gcp-key.json

      - name: Git konfigurieren
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config user.email "claude-code@adesso.de"
          git config user.name "Claude Code Agent"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

      - name: Feature-Branch anlegen oder auschecken
        run: |
          git checkout -b "feature/${JIRA_TICKET_ID}" 2>/dev/null || git checkout "feature/${JIRA_TICKET_ID}"

      - name: Jira-Ticket laden
        env:
          JIRA_USER: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_URL: ${{ secrets.JIRA_BASE_URL }}
        run: |
          CONTENT=$(curl -sf \
            -u "${JIRA_USER}:${JIRA_TOKEN}" \
            -H "Accept: application/json" \
            "${JIRA_URL}/rest/api/3/issue/${JIRA_TICKET_ID}?fields=summary,description" \
            || echo '{}')
          echo "TICKET_CONTENT<<TICKET_EOF" >> "$GITHUB_ENV"
          echo "$CONTENT" >> "$GITHUB_ENV"
          echo "TICKET_EOF" >> "$GITHUB_ENV"

      - name: Claude Agent — Implementierung
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
          CONF_CONTEXT: "Kein Confluence-Kontext konfiguriert"
        run: python3 scripts/claude-agent.py scripts/prompts/implement.txt 80

      - name: Feature-Branch pushen
        run: git push origin "feature/${JIRA_TICKET_ID}" --force

# ── TEST ──────────────────────────────────────────────────────────────────────

  test-unit:
    needs: implement
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_VERTEX_PROJECT_ID: "mock"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/${{ github.event.inputs.jira_ticket_id }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhaengigkeiten installieren
        run: pip install -q fastapi uvicorn pydantic pytest httpx "anthropic[vertex]>=0.40.0"

      - name: Unit-Tests ausfuehren
        run: cd backend && python3 -m pytest tests/ -v --tb=short

  test-e2e:
    needs: implement
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/${{ github.event.inputs.jira_ticket_id }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Python-Pakete installieren
        run: pip install -q fastapi uvicorn pydantic "anthropic[vertex]>=0.40.0"

      - name: Backend starten
        env:
          DB_PATH: /tmp/e2e.db
          ANTHROPIC_VERTEX_PROJECT_ID: mock
        run: cd backend && uvicorn main:app --host 0.0.0.0 --port 8000 &

      - name: Frontend bauen und servieren
        run: |
          cd frontend && npm ci
          VITE_API_URL=http://localhost:8000 npm run build
          npx serve dist --listen 5173 &

      - name: Auf Backend warten
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/health && break || sleep 2
          done

      - name: Playwright installieren
        run: |
          npm install -D "@playwright/test@1.44.0"
          npx playwright install --with-deps chromium

      - name: E2E-Tests ausfuehren
        run: FRONTEND_URL=http://localhost:5173 npx playwright test --reporter=list

# ── FIX LOOP ──────────────────────────────────────────────────────────────────

  fix:
    needs: [test-unit, test-e2e]
    if: ${{ always() && needs.test-unit.result == 'failure' }}
    runs-on: ubuntu-latest
    env:
      FIX_ITERATION: "1"
      ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/${{ github.event.inputs.jira_ticket_id }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhaengigkeiten installieren
        run: pip install -q fastapi uvicorn pydantic pytest httpx "anthropic[vertex]>=0.40.0"

      - name: GCP Credentials einrichten
        env:
          GCP_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: echo "$GCP_KEY" | base64 -d > /tmp/gcp-key.json

      - name: Git konfigurieren
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config user.email "claude-code@adesso.de"
          git config user.name "Claude Code Bug Fixer"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

      - name: Tests ausfuehren und Output sammeln
        env:
          ANTHROPIC_VERTEX_PROJECT_ID: mock
        run: |
          cd backend && python3 -m pytest tests/ -v --tb=long 2>&1 | tee /tmp/test-output.txt; cd ..

      - name: Fix-Agent ausfuehren
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: |
          export TEST_OUTPUT="$(cat /tmp/test-output.txt | tail -80)"
          python3 scripts/claude-agent.py scripts/prompts/fix.txt 30

      - name: Fixes pushen
        run: git push origin "feature/${JIRA_TICKET_ID}" --force

      - name: Tests nach Fix verifizieren
        env:
          ANTHROPIC_VERTEX_PROJECT_ID: mock
        run: cd backend && python3 -m pytest tests/ -v --tb=short

# ── FINALIZE ──────────────────────────────────────────────────────────────────

  create-pr:
    needs: test-unit
    if: ${{ always() && needs.test-unit.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/${{ github.event.inputs.jira_ticket_id }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhaengigkeiten installieren
        run: pip install -q "anthropic[vertex]>=0.40.0"

      - name: GCP Credentials einrichten
        env:
          GCP_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: echo "$GCP_KEY" | base64 -d > /tmp/gcp-key.json

      - name: Git konfigurieren
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config user.email "claude-code@adesso.de"
          git config user.name "Claude Code Agent"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

      - name: Feature-Dokumentation generieren
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
        run: python3 scripts/claude-agent.py scripts/prompts/document.txt 15

      - name: Pull Request erstellen oder wiederverwenden
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_URL: ${{ secrets.JIRA_BASE_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PR_URL=$(gh pr list \
            --head "feature/${JIRA_TICKET_ID}" \
            --state open \
            --json url --jq '.[0].url' 2>/dev/null || echo "")

          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --title "[${JIRA_TICKET_ID}] Automatisch implementiert durch Claude Code" \
              --body "## Automatisch generiert durch Claude Code

**Jira Ticket:** ${JIRA_URL}/browse/${JIRA_TICKET_ID}
**Workflow:** ${RUN_URL}

Alle Unit Tests erfolgreich.

Feature-Dokumentation: \`docs/FEATURE_DOCS.md\`" \
              --base main \
              --head "feature/${JIRA_TICKET_ID}" 2>/dev/null || echo "")
          fi

          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "PR: ${PR_URL}"

      - name: Jira kommentieren und Status setzen
        env:
          JIRA_USER: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_URL: ${{ secrets.JIRA_BASE_URL }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          curl -sf -X POST \
            -u "${JIRA_USER}:${JIRA_TOKEN}" \
            -H "Content-Type: application/json" \
            "${JIRA_URL}/rest/api/3/issue/${JIRA_TICKET_ID}/comment" \
            -d "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"Pull Request erstellt: ${PR_URL}\"}]}]}}" || true

          TRANSITIONS=$(curl -sf \
            -u "${JIRA_USER}:${JIRA_TOKEN}" \
            "${JIRA_URL}/rest/api/3/issue/${JIRA_TICKET_ID}/transitions")
          TRANSITION_ID=$(echo "$TRANSITIONS" | python3 -c "
          import sys,json
          for t in json.load(sys.stdin).get('transitions',[]):
              if any(k in t['name'].lower() for k in ['review','ready','bereit']):
                  print(t['id']); break
          " 2>/dev/null || echo "")
          if [ -n "$TRANSITION_ID" ]; then
            curl -sf -X POST \
              -u "${JIRA_USER}:${JIRA_TOKEN}" \
              -H "Content-Type: application/json" \
              "${JIRA_URL}/rest/api/3/issue/${JIRA_TICKET_ID}/transitions" \
              -d "{\"transition\":{\"id\":\"${TRANSITION_ID}\"}}" || true
          fi

# ── RESET ─────────────────────────────────────────────────────────────────────

  reset:
    if: ${{ github.event.inputs.pipeline_type == 'reset-demo' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git konfigurieren
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config user.email "claude-code@adesso.de"
          git config user.name "Demo Reset Bot"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"

      - name: Feature-Branches loeschen und PRs schliessen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --prune
          for branch in $(git branch -r | grep 'origin/feature/' | sed 's/.*origin\///'); do
            git push origin --delete "$branch" 2>/dev/null && echo "Geloescht: $branch" || true
          done
          gh pr list --state open --json number --jq '.[].number' | while read -r pr; do
            gh pr close "$pr" 2>/dev/null && echo "PR #${pr} geschlossen" || true
          done
          echo "Reset abgeschlossen"
