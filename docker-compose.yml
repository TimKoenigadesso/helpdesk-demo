version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/db
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
        VITE_JIRA_URL: ${VITE_JIRA_URL:-}
        VITE_GITLAB_URL: ${VITE_GITLAB_URL:-}
        VITE_CONFLUENCE_URL: ${VITE_CONFLUENCE_URL:-}
        VITE_GITLAB_PROJECT_PATH: ${VITE_GITLAB_PROJECT_PATH:-}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db-data:
